<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="image_14fcbc.png">
    <title>soumano Hub</title>
    <style>
        body { 
            background: #000; 
            background-image: radial-gradient(circle at center, #222 0%, #000 100%);
            font-family: "Helvetica Neue", Arial, sans-serif; 
            margin: 0; 
            padding: 0; 
            color: #fff;
            overflow: hidden;
        }
        
        .status-bar { height: 20px; width: 100%; }

        .app-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 25px 15px;
            padding: 30px 20px;
        }

        .app-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: #fff;
            -webkit-tap-highlight-color: rgba(0,0,0,0);
        }

        .app-icon-box {
            width: 62px;
            height: 62px;
            border-radius: 14px;
            background: #333;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.7);
            margin-bottom: 6px;
            position: relative;
            overflow: hidden;
            border: 0.5px solid rgba(255,255,255,0.2);
        }

        .app-icon-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* 旧YouTube用のバッジ（わかりやすくするため） */
        .badge-old {
            position: absolute;
            bottom: 0;
            width: 100%;
            background: rgba(0,0,0,0.7);
            font-size: 8px;
            color: #aaa;
            text-align: center;
            padding: 2px 0;
        }

        .app-label {
            font-size: 11px;
            font-weight: 400;
            text-shadow: 0 1px 2px #000;
            white-space: nowrap;
        }

        .app-item:active { opacity: 0.6; transform: scale(0.92); transition: 0.1s; }
    </style>
</head>
<body>

<div class="status-bar"></div>

<div class="app-grid">
    <a href="old.html" class="app-item">
        <div class="app-icon-box">
            <img src="image_14fcbc.png" class="app-icon-img">
            <div class="badge-old">CLASSIC</div>
        </div>
        <span class="app-label">YT Old</span>
    </a>

    <a href="modern.html" class="app-item">
        <div class="app-icon-box" style="background: #000;">
            <img src="image_14fcbc.png" class="app-icon-img">
        </div>
        <span class="app-label">YouTube</span>
    </a>

    <a href="twitter.html" class="app-item">
        <div class="app-icon-box">
            <img src="twitter_image.png" class="app-icon-img" onerror="this.src='https://abs.twimg.com/icons/apple-touch-icon-192x192.png'">
        </div>
        <span class="app-label">Twitter</span>
    </a>

    <a href="cloud.html" class="app-item">
        <div class="app-icon-box">
            <img src="cloud.png" class="app-icon-img" onerror="this.style.display='none'; this.parentNode.innerText='☁️'">
        </div>
        <span class="app-label">iCloud</span>
    </a>

    <a href="#" class="app-item" onclick="location.reload()">
        <div class="app-icon-box" style="background: linear-gradient(#999, #555);">🔄</div>
        <span class="app-label">Reload</span>
    </a>
</div>

</body>
</html>
